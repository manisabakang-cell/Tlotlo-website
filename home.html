<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background-image: url('home page 2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            width: 100%;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: grey;
        }

        main {
            text-align: center;
            padding: 80px 20px;
            background: rgba(0, 0, 0, 0.45);
            min-height: 70vh;
        }

        h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
        }

       /* Logo */
        .logo-container {
            margin-top: 40px;
        }

        .animated-image {
            width: 250px;
            height: 250px;
            object-fit: cover;

            /* Start as square */
            border-radius: 0%;

            transition:
                border-radius 1s ease,
                transform 0.4s ease,
                box-shadow 0.4s ease;

            animation: circleReveal 2s forwards;
        }

        /* Hover Animation */
        .animated-image:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        /* Circle Animation */
        @keyframes circleReveal {

            from {
                border-radius: 0%;
                transform: rotate(0deg);
            }

            to {
                border-radius: 50%;
                transform: rotate(360deg);
            }
        }
        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
        }

    </style>
</head>

<body>

    <header>
        <h1>Find Your Home</h1>

        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">Learn more about us</a>
            <a href="packages.html">Packages</a>
            <a href="contact us.html">Contact Us</a>
            <a href="book your seat.html">Secure Your Seat</a>
              
            </a>
        </nav>
    </header>

    <main>

        <section>
            <h2>Kamol Logistics</h2>

            <p>
               Book your seat with us
            </p>

            <p>
                Your journey. Our priority.
            </p>
        </section>

        <div class="logo-container">
            <img src="logo.jpeg" alt="Brand Logo" class="animated-image">

            <h3 class="mt-3">
                 Let's Go Have Fun!  
            </h3>
        </div>

    </main>

    <footer>
        <p>&copy; Kamol Logistics. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
